name: JustRunMy 自动续期
on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 */1 * *'
jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      actions: write
    steps:
      - name: 📥 拉取私库代码
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/JustRunMy-Keep-Private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 🛡️ 启动 GOST 代理转发
        if: ${{ env.GOST_PROXY != '' }}
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          echo "📦 GOST 版本: $VERSION"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &
          sleep 3
          echo "✅ GOST 已启动，测试连通性..."
          curl -s -x http://127.0.0.1:8080 https://api.ipify.org \
            | sed 's/\([0-9]*\.[0-9]*\.[0-9]*\.\)[0-9]*/\1**/g'
          echo "USE_PROXY=true" >> $GITHUB_ENV

      - name: 🌐 直连模式标记
        if: ${{ env.GOST_PROXY == '' }}
        run: echo "USE_PROXY=false" >> $GITHUB_ENV

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            x11-utils \
            xdotool \
            scrot \
            fonts-noto-cjk

      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase aiohttp requests
          seleniumbase install chromedriver

      - name: 🚀 执行续期
        env:
          JUSTRUNMY_ACCOUNT: ${{ secrets.JUSTRUNMY_ACCOUNT }}
          GOST_PROXY:        ${{ secrets.GOST_PROXY }}
          TG_BOT:            ${{ secrets.TG_BOT }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python justrunmy_renew.py

      - name: 📸 上传调试截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
          retention-days: 3

      - name: 🧹 清理旧的工作流运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 3
